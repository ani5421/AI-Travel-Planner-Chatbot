<!DOCTYPE html>

<html>
<head>
<title>WanderLustAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

<style>
/* ✅ SAME STYLE — unchanged */
  body {
    background: rgb(191,255,199);
    background: linear-gradient(310deg, rgba(191,255,199,1) 17%, rgba(86,223,198,0.6172566371681416) 89%);
  font-family: Fredoka;
  font-weight: 100; 
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

#chat-history::-webkit-scrollbar { width: 0px; }
#chat-history::-webkit-scrollbar-track { background-color: #f1f1f1; }
#chat-history::-webkit-scrollbar-thumb { background-color: #888; border-radius: 5px; }
#chat-history::-webkit-scrollbar-thumb:hover { background-color: #555; }

#chat-container {
  background: linear-gradient(150deg, rgba(191,255,199,1) 20%, rgba(86,223,198,0.6172566371681416) 89%);
  border-radius: 50px;
  padding: 20px;
  box-shadow: 0px 2px 5px rgba(78, 77, 77, 0.1);
  width: 100%;
  max-width: 600px;
  height: 80vh;
}

h1 { font-weight: lighter; text-align: center; margin-bottom: 10px; }

#chat-history {
  height: 60vh;
  overflow-y: scroll;
  border-radius: 20px;
}

.user-message {
  text-align: right;
  padding: 10px;
  background-color: #f2f7ef;
  border-radius: 50px;
  margin-bottom: 10px;
  font-size: 20px;
}

.bot-message {
  text-align: left;
  padding: 10px;
  background-color: #fcfffc;
  border-radius: 20px;
  margin-bottom: 20px;
  font-size: 20px;
}

form { display: flex; margin-top: 90px; }

input {
  flex-grow: 1;
  margin-right: 10px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 100px;
  font-size: 1em;
}

button {
  background-color: #4bacc9da;
  border: none;
  padding: 10px;
  border-radius: 100%;
  cursor: pointer;
}

#loader {
  display: none;
  position: absolute;
  top: 80%;
  left: 50%;
  transform: translate(-50%, -50%);
}

#loader img {
  padding: 10px;
  width: 100px;
  height: 100px;
}
</style>

</head>

<body>
<div id="chat-container">
  <h1>WanderLustAI</h1>
  <div id="chat-history"></div>

  <form id="chat-form">
    <input type="text" id="user-input" placeholder="Say Hi To Start The Conversation.....">
    <button type="submit">Send</button>
  </form>
</div>

<div id="loader">
  <img src="loader.gif" alt="Loading...">
</div>

<script>
const chatHistory = document.getElementById('chat-history');
const userInput = document.getElementById('user-input');
const form = document.getElementById('chat-form');
const loader = document.getElementById('loader');

async function sendMessage() {
  const userMessage = userInput.value.trim();
  if (!userMessage) return;

  userInput.value = '';

  chatHistory.innerHTML += `<div class="user-message">${userMessage}</div>`;
  chatHistory.scrollTop = chatHistory.scrollHeight;

  try {
    const response = await fetch('http://localhost:5000/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ message: userMessage }),
    });

    // ❗ FIX 1: check if response is OK
    if (!response.ok) {
      throw new Error("Server error: " + response.status);
    }

    const data = await response.json();

    // ❗ FIX 2: safe fallback
    const botMessage = data?.reply || "No response from server";

    chatHistory.innerHTML += `<div class="bot-message">${botMessage}</div>`;
    chatHistory.scrollTop = chatHistory.scrollHeight;

  } catch (error) {
    console.error('Error:', error);

    chatHistory.innerHTML += `<div class="bot-message">⚠️ Server not responding</div>`;
  }

  userInput.focus();
}

form.addEventListener('submit', (event) => {
  event.preventDefault();

  loader.style.display = 'block';

  sendMessage().finally(() => {
    loader.style.display = 'none';
  });
});
</script>

</body>
</html>
